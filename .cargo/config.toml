[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

# Do NOT add `-Wl,-no_compact_unwind` for aarch64-apple-darwin here (it once
# was, to silence a linker warning). It breaks C++ exception unwinding in the
# bundled DuckDB, so any DuckDB error crashed oxen-server on Apple Silicon:
# `libc++abi: terminating due to uncaught exception of type duckdb::...` +
# SIGABRT, e.g. on bad SQL or replaying a workspace data frame's WAL.

name: 🧪🍏 Build macOS Wheels

on:
  workflow_call:
    inputs:
      PYTHON_VERSIONS:
        description: "Python versions to build"
        required: true
        type: string
      CHECKOUT_REF:
        description: "Git ref (SHA or branch) to checkout"
        required: true
        type: string
      VERSION_OVERRIDE:
        description: "Version string to set in pyproject.toml (e.g. 0.44.1.dev0)"
        required: true
        type: string
      AWS_ROLE:
        description: "AWS role to assume"
        required: true
        type: string
      AWS_REGION:
        description: "AWS region"
        required: true
        type: string

env:
  MACOSX_DEPLOYMENT_TARGET: 10.13

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  build_wheels:
    name: Build Python wheels
    runs-on: macos-15-xlarge
    env:
      RUSTC_WRAPPER: sccache
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      SCCACHE_BUCKET: oxen-release-build-cache
      SCCACHE_REGION: us-west-1
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.CHECKOUT_REF }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.AWS_ROLE }}
          role-duration-seconds: 3600
          aws-region: ${{ inputs.AWS_REGION }}

      - name: Patch version in pyproject.toml and Cargo.toml
        run: |
          bash ${{ github.workspace }}/bin/patch_dev_version "${{ inputs.VERSION_OVERRIDE }}"

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release-python"
          workspaces: "."

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build Python wheels
        run: |
          uv python install ${{ inputs.PYTHON_VERSIONS }}

          cd ${{ github.workspace }}/oxen-python

          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

          for version in ${{ inputs.PYTHON_VERSIONS }}; do
            uvx maturin build --release --interpreter /Users/runner/.local/bin/python${version} --target aarch64-apple-darwin
            uvx maturin build --release --interpreter /Users/runner/.local/bin/python${version} --target x86_64-apple-darwin
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos
          path: ${{ github.workspace }}/target/wheels/*.whl
          retention-days: 1

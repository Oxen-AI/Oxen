name: 🐂🔎 Continuous integration - Lint

on:
  workflow_call:

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  check:
    name: Cargo check, format, clippy + Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy rust-toolchain.toml to root
        run: |
          cp ${{ github.workspace }}/oxen-rust/rust-toolchain.toml .

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Only cache builds from main. Otherwise our caches will be too big and start to churn. (10 GB limit in GitHub Actions)
          # Other branches will still use the cache but won't save it.
          save-if: ${{ github.ref == 'refs/heads/main' }}
          workspaces: |
            oxen-rust
            oxen-python

      - name: Install dependencies and development tools
        run: |
          cd ${{ github.workspace }}
          ./scripts/install-pre-reqs.sh

      - name: Run Pre-Commit Hooks
        run: |
          cd ${{ github.workspace }}
          if ! pre-commit run --color=always --verbose --all-files ; then
            echo "Pre-commit failed. Showing git status:"
            git -c color.status=always status
            exit 1
          fi

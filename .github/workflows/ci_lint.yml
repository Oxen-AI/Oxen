name: 🐂🔎 Continuous integration - Lint

on:
  workflow_call:

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  check:
    name: Cargo check, format, clippy + Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: false # This action doesn't plumb all the options we need through to Swatinem/rust-cache, so we disable it and use it directly.

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Cache compiled Rust artifacts using sccache
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          # Only cache builds from main. Otherwise our caches will be too big and start to churn. (10 GB limit in GitHub Actions)
          # Other branches will still use the cache but won't save it.
          # TODO: Investigate switching to S3 for caching
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-targets: false # We'll use sccache for the compiled artifacts
          cache-on-failure: true # Even if compilation fails, saving the cargo registry is useful
          cache-all-crates: true # Cache anything installed with "cargo install"
          workspaces: "."

      - name: Install dependencies and development tools
        run: |
          cd ${{ github.workspace }}
          ./scripts/install-pre-reqs.sh

      - name: Run Pre-Commit Hooks
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          cd ${{ github.workspace }}
          if ! pre-commit run --color=always --verbose --all-files ; then
            echo "Pre-commit failed. Showing git status:"
            git -c color.status=always status
            exit 1
          fi

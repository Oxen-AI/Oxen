name: 🚀🍏 Release MacOS

on:
  workflow_call:
    inputs:
      PYTHON_VERSIONS:
        description: "Python versions to build"
        required: true
        type: string
      AWS_ROLE:
        description: "AWS role to assume"
        required: true
        type: string
      AWS_REGION:
        description: "AWS region"
        required: true
        type: string

env:
  MACOSX_DEPLOYMENT_TARGET: 10.13

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  release_macos:
    name: Release Oxen MacOS
    runs-on: macos-15-xlarge
    env:
      RUSTC_WRAPPER: sccache
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      SCCACHE_BUCKET: oxen-release-build-cache
      SCCACHE_REGION: us-west-1
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.AWS_ROLE }}
          role-duration-seconds: 3600
          aws-region: ${{ inputs.AWS_REGION }}

      - name: Create release directory
        run: mkdir ${{ github.workspace }}/release

      - name: Install rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Build oxen binaries
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

          cargo build --workspace --exclude oxen-py --release --target aarch64-apple-darwin
          cargo build --workspace --exclude oxen-py --release --target x86_64-apple-darwin

      - name: Build Python wheels
        run: |
          uv python install ${{ inputs.PYTHON_VERSIONS }}

          cd ${{ github.workspace }}/oxen-python

          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

          for version in ${{ inputs.PYTHON_VERSIONS }}; do
            uvx maturin build --release --interpreter /Users/runner/.local/bin/python${version} --target aarch64-apple-darwin
            uvx maturin build --release --interpreter /Users/runner/.local/bin/python${version} --target x86_64-apple-darwin
          done

      - name: sccache stats
        if: always()
        run: sccache --show-stats

      - name: Create tarballs with oxen binaries
        run: |
          tar -czvf ${{ github.workspace }}/release/oxen-macos-arm64.tar.gz -C ${{ github.workspace }}/target/aarch64-apple-darwin/release/ oxen
          tar -czvf ${{ github.workspace }}/release/oxen-macos-x86_64.tar.gz -C ${{ github.workspace }}/target/x86_64-apple-darwin/release/ oxen
          tar -czvf ${{ github.workspace }}/release/oxen-server-macos-arm64.tar.gz -C ${{ github.workspace }}/target/aarch64-apple-darwin/release/ oxen-server
          tar -czvf ${{ github.workspace }}/release/oxen-server-macos-x86_64.tar.gz -C ${{ github.workspace }}/target/x86_64-apple-darwin/release/ oxen-server

      - name: Create tarballs with Python wheels
        run: |
          cd ${{ github.workspace }}/target/wheels/

          tar -czvf ${{ github.workspace }}/release/oxen-wheels-macos-x86_64.tar.gz ./*x86_64.whl
          tar -czvf ${{ github.workspace }}/release/oxen-wheels-macos-arm64.tar.gz ./*arm64.whl

      - name: Create tarball with all artifacts
        run: |
          tar -czvf ${{ github.workspace }}/oxen-macos-release.tar.gz -C ${{ github.workspace }}/release/ .

      - name: Upload all artifacts
        uses: actions/upload-artifact@v7
        with:
          name: oxen-macos-release.tar.gz
          path: ${{ github.workspace }}/oxen-macos-release.tar.gz
          retention-days: 1

name: 🚀🪟 Release Windows

on:
  workflow_call:
    inputs:
      ARCHITECTURE:
        description: "The architecture to build for"
        required: true
        default: "x86_64"
        type: string
      AWS_ROLE:
        description: "AWS role to assume"
        required: true
        type: string
      AWS_REGION:
        description: "AWS region"
        required: true
        type: string
      PYTHON_VERSIONS:
        description: "Python versions to build"
        required: true
        type: string
    secrets:
      GH_PERSONAL_ACCESS_TOKEN:
        description: "GitHub personal access token"
        required: true

env:
  EC2_IMAGE_ID: ami-0cfb2e47dd591ebdb
  EC2_INSTANCE_TYPE: m7i.4xlarge

jobs:
  start-self-hosted-runner:
    name: Start self-hosted EC2 runner
    runs-on: ubuntu-latest
    outputs:
      label: ${{ steps.start-ec2-runner.outputs.label }}
      ec2-instance-id: ${{ steps.start-ec2-runner.outputs.ec2-instance-id }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.AWS_ROLE }}
          role-duration-seconds: 900
          aws-region: ${{ inputs.AWS_REGION }}

      - name: Start EC2 runner
        id: start-ec2-runner
        uses: Oxen-AI/ec2-github-runner-windows@v1
        with:
          mode: start
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          ec2-image-id: ${{ env.EC2_IMAGE_ID }}
          ec2-instance-type: ${{ env.EC2_INSTANCE_TYPE }}
          ec2-os: windows
          startup-timeout-minutes: 10
          subnet-id: subnet-0e28805edbdad482f
          security-group-id: sg-09c8aa5830122d671
          iam-role-name: github-runner-instance-profile
          aws-resource-tags: >
            [
              {"Key": "Name", "Value": "ec2-github-runner"}
            ]

  release_windows:
    name: Build Oxen CLI, Server, and Python wheels
    needs: start-self-hosted-runner
    runs-on: ${{ needs.start-self-hosted-runner.outputs.label }}
    defaults:
      run:
        shell: powershell

    env:
      RUSTC_WRAPPER: sccache
      # cc-rs (duckdb/rocksdb/zstd bundled builds) intercepts via CC/CXX;
      # cmake-driven builds (aws-lc) need the launcher vars plus a generator
      # that honors them (Visual Studio generators ignore launchers).
      CC: sccache cl
      CXX: sccache cl
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      CMAKE_GENERATOR: Ninja
      # aws-lc-sys's cc builder misdetects the compiler family behind the
      # sccache wrapper and emits GCC-builtin calls that MSVC can't link;
      # its cmake path probes the toolchain correctly (and NASM is installed)
      AWS_LC_SYS_CMAKE_BUILDER: "1"
      SCCACHE_BUCKET: oxen-ci-build-cache
      SCCACHE_REGION: us-west-1
      # vcpkg rebuilds FFmpeg from source on every ephemeral runner without this
      VCPKG_BINARY_SOURCES: clear;x-aws,s3://oxen-ci-build-cache/vcpkg/,readwrite
      # MSVC stamps wall-clock timestamps into linked PE files and .obj COFF
      # headers; sccache hashes proc-macro dlls (--extern) and staticlib members
      # into downstream Rust keys, so unstamped output churns those keys every
      # run. /Brepro zeroes the timestamps.
      RUSTFLAGS: -Clink-arg=/Brepro
      CFLAGS: /Brepro
      CXXFLAGS: /Brepro
      CARGO_INCREMENTAL: "0"
      SCCACHE_ERROR_LOG: C:\sccache.log
      SCCACHE_IDLE_TIMEOUT: "0"
      # sccache=debug logs crate names per request, to attribute cache misses
      SCCACHE_LOG: warn,sccache=debug

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create release directory
        run: mkdir ${{ github.workspace }}\release

      - name: Exclude build paths from Windows Defender
        run: |
          try {
            Set-MpPreference -ExclusionPath @("C:\Windows\System32\actions-runner", "C:\Users\Administrator\.cargo", "C:\Users\Administrator\.rustup", "C:\vcpkg", "C:\ProgramData\chocolatey", "$env:TEMP")
            Set-MpPreference -ExclusionProcess @("rustc.exe", "cargo.exe", "sccache.exe", "cl.exe", "link.exe", "cmake.exe", "ninja.exe", "python.exe", "git.exe")
            Write-Host "Defender exclusions applied"
          } catch {
            Write-Host "Defender exclusions unavailable: $_"
          }

      - name: Install dependencies
        run: |
          choco install -y cmake llvm uv rustup.install ninja nasm
          if (-not (Get-Command aws -ErrorAction SilentlyContinue)) {
            choco install -y awscli
            # choco appends to the machine PATH; this process needs it now for vcpkg's x-aws
            $env:Path = "C:\Program Files\Amazon\AWSCLIV2;$env:Path"
          }
          aws --version
          # Install sccache 0.16 to a machine-PATH dir so it survives refreshenv
          Invoke-WebRequest -Uri "https://github.com/mozilla/sccache/releases/download/v0.16.0/sccache-v0.16.0-x86_64-pc-windows-msvc.zip" -OutFile C:\sccache.zip
          Expand-Archive -Path C:\sccache.zip -DestinationPath C:\sccache-dl -Force
          Copy-Item C:\sccache-dl\sccache-v0.16.0-x86_64-pc-windows-msvc\sccache.exe C:\ProgramData\chocolatey\bin\sccache.exe -Force
          # Widen the Windows ephemeral TCP port range (sccache client<->server IPC is TCP localhost)
          netsh int ipv4 set dynamicport tcp start=10000 num=55000
          # Install vcpkg for FFmpeg development libraries
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          cd C:\vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe install ffmpeg:x64-windows
          # Set VCPKG_ROOT for cargo to find FFmpeg libraries
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Restore host tool outputs
        run: |
          refreshenv
          # Proc-macro dlls never link byte-identically across runs (their PE
          # content varies even with /Brepro), and sccache hashes them into every
          # direct consumer's key. Restoring the previous run's dlls plus cargo's
          # .fingerprint dirs makes cargo treat them as Fresh, so the same bytes
          # feed downstream hashes every run. Units whose outputs are absent
          # (all rlibs) stay dirty and rebuild through sccache as usual.
          $lock = (Get-FileHash Cargo.lock -Algorithm SHA256).Hash
          $rv = (cmd /c "rustc -V 2>nul") -join ''
          $keySrc = "$rv|$lock|-Clink-arg=/Brepro|v1"
          $sha = [System.BitConverter]::ToString([System.Security.Cryptography.SHA256]::Create().ComputeHash([System.Text.Encoding]::UTF8.GetBytes($keySrc))).Replace("-","").Substring(0,32)
          echo "HOSTDLL_KEY=$sha" >> $env:GITHUB_ENV
          cmd /c "aws s3 cp s3://oxen-ci-build-cache/hostdlls/$sha.tgz C:\hostdlls.tgz 2>nul"
          if (Test-Path C:\hostdlls.tgz) {
            New-Item -ItemType Directory -Force -Path ${{ github.workspace }}\target\release | Out-Null
            tar -xzf C:\hostdlls.tgz -C ${{ github.workspace }}\target\release
            Write-Host "HOSTDLL restore hit ($sha)"
          } else {
            Write-Host "HOSTDLL restore miss ($sha)"
          }

      - name: Build oxen binaries
        run: |
          refreshenv
          # cc-rs only self-locates MSVC when CC is unset; with CC="sccache cl"
          # the dev shell must put cl.exe (+ INCLUDE/LIB) in the environment
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module (Join-Path $vsPath "Common7\Tools\Microsoft.VisualStudio.DevShell.dll")
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64'
          $env:RUSTC_WRAPPER = "sccache"
          $env:RUSTFLAGS = "-Clink-arg=/Brepro"
          $env:CC = "sccache cl"
          $env:CXX = "sccache cl"
          $env:CFLAGS = "/Brepro"
          $env:CXXFLAGS = "/Brepro"
          $env:CMAKE_C_COMPILER_LAUNCHER = "sccache"
          $env:CMAKE_CXX_COMPILER_LAUNCHER = "sccache"
          $env:CMAKE_GENERATOR = "Ninja"
          $env:AWS_LC_SYS_CMAKE_BUILDER = "1"
          cmd /c "sccache --start-server"
          cargo build --workspace --exclude oxen-py --release
          $cargoExit = $LASTEXITCODE
          sccache --show-stats
          exit $cargoExit

      - name: Save host tool outputs
        run: |
          if (Test-Path C:\hostdlls.tgz) { Write-Host "HOSTDLL cache already present"; exit 0 }
          Set-Location ${{ github.workspace }}\target\release
          $list = @(Get-ChildItem deps\*.dll -ErrorAction SilentlyContinue; Get-ChildItem deps\libblake3-*.rlib -ErrorAction SilentlyContinue; Get-ChildItem deps\libpsm-*.rlib -ErrorAction SilentlyContinue) | ForEach-Object { "deps/$($_.Name)" }
          $list += ".fingerprint"
          $list | Set-Content C:\hostdll-list.txt
          tar -czf C:\hostdlls-out.tgz -T C:\hostdll-list.txt
          aws s3 cp C:\hostdlls-out.tgz s3://oxen-ci-build-cache/hostdlls/$env:HOSTDLL_KEY.tgz
          Write-Host "HOSTDLL saved ($env:HOSTDLL_KEY)"

      - name: Build Python wheels
        run: |
          refreshenv
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module (Join-Path $vsPath "Common7\Tools\Microsoft.VisualStudio.DevShell.dll")
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments '-arch=x64'
          $env:RUSTC_WRAPPER = "sccache"
          $env:RUSTFLAGS = "-Clink-arg=/Brepro"
          $env:CC = "sccache cl"
          $env:CXX = "sccache cl"
          $env:CFLAGS = "/Brepro"
          $env:CXXFLAGS = "/Brepro"
          $env:CMAKE_C_COMPILER_LAUNCHER = "sccache"
          $env:CMAKE_CXX_COMPILER_LAUNCHER = "sccache"
          $env:CMAKE_GENERATOR = "Ninja"
          $env:AWS_LC_SYS_CMAKE_BUILDER = "1"
          uv python install ${{ inputs.PYTHON_VERSIONS }}

          cd ${{ github.workspace }}\oxen-python

          $versions = "${{ inputs.PYTHON_VERSIONS }}" -split ' '
          foreach ($version in $versions) {
              uvx maturin build --release --interpreter "C:\Users\Administrator\AppData\Roaming\uv\python\cpython-$version.*\python.exe"
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: sccache stats
        if: always()
        run: |
          refreshenv
          sccache --show-stats

      - name: Fingerprint build artifacts
        if: always()
        run: |
          Get-ChildItem ${{ github.workspace }}\target\release\deps\* -Include *.dll,*.rlib -ErrorAction SilentlyContinue | Get-FileHash -Algorithm SHA256 | ForEach-Object { "FPR $($_.Hash.Substring(0,20)) $(Split-Path $_.Path -Leaf)" } | Sort-Object

      - name: sccache error log
        if: always()
        run: |
          if (Test-Path C:\sccache.log) {
            $lines = Get-Content C:\sccache.log
            Write-Host "sccache.log: $($lines.Count) lines (full file in artifact)"
            $lines | Select-String -Pattern ' WARN | ERROR ' | Select-Object -First 60 | ForEach-Object { $_.Line }
            Write-Host "--- tail ---"
            $lines | Select-Object -Last 40
          } else { Write-Host "no sccache error log" }

      - name: Upload sccache server log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sccache-server-log-windows
          path: C:\sccache.log
          if-no-files-found: warn
          retention-days: 1

      - name: Create zip with oxen binaries
        run: |
          Compress-Archive -Path "${{ github.workspace }}\target\release\oxen.exe" -DestinationPath "${{ github.workspace }}\release\oxen-windows-${{ inputs.ARCHITECTURE }}.exe.zip"
          Compress-Archive -Path "${{ github.workspace }}\target\release\oxen-server.exe" -DestinationPath "${{ github.workspace }}\release\oxen-server-windows-${{ inputs.ARCHITECTURE }}.exe.zip"

      - name: Create zip with Python wheels
        run: |
          Compress-Archive -Path ${{ github.workspace }}\target\wheels\* -DestinationPath ${{ github.workspace }}\release\oxen-wheels-windows-${{ inputs.ARCHITECTURE }}.zip

      - name: Create zip with all artifacts
        run: |
          Compress-Archive -Path "${{ github.workspace }}\release\*" -DestinationPath "${{ github.workspace }}\release\oxen-windows-${{ inputs.ARCHITECTURE }}-release.zip"

      - name: Upload all artifacts
        uses: actions/upload-artifact@v7
        with:
          name: oxen-windows-release-${{ inputs.ARCHITECTURE }}.zip
          path: ${{ github.workspace }}\release\oxen-windows-${{ inputs.ARCHITECTURE }}-release.zip
          retention-days: 1

  stop-self-hosted-runner:
    name: Stop self-hosted EC2 runner
    needs:
      - start-self-hosted-runner
      - release_windows
    runs-on: ubuntu-latest
    if: ${{ always() }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.AWS_ROLE }}
          role-duration-seconds: 900
          aws-region: ${{ inputs.AWS_REGION }}

      - name: Stop EC2 runner
        uses: Oxen-AI/ec2-github-runner-windows@v1
        with:
          mode: stop
          github-token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          label: ${{ needs.start-self-hosted-runner.outputs.label }}
          ec2-instance-id: ${{ needs.start-self-hosted-runner.outputs.ec2-instance-id }}

# Temporary: validates the sccache build cache. Currently measuring the legs
# without warm numbers: macOS release, Linux arm64 release, Linux arm64 wheels.
# Remove before merging.
name: 🧪 Test build cache

on:
  push:
    branches:
      - eric/cache-ci-builds

permissions:
  id-token: write
  contents: read

jobs:
  macos:
    uses: ./.github/workflows/release_macos.yml
    with:
      PYTHON_VERSIONS: "3.11"
      AWS_ROLE: arn:aws:iam::213020545630:role/github-runner-role
      AWS_REGION: us-west-1

  linux_arm64:
    uses: ./.github/workflows/release_linux.yml
    with:
      ARCHITECTURE: arm64
      AWS_ROLE: arn:aws:iam::213020545630:role/github-runner-role
      AWS_REGION: us-west-1
      PYTHON_VERSIONS: "3.11"
      RELEASE_VERSION: "0.0.0-cache-test"
    secrets:
      GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}

  linux_arm64_wheels:
    uses: ./.github/workflows/build_wheels_linux.yml
    with:
      ARCHITECTURE: arm64
      AWS_ROLE: arn:aws:iam::213020545630:role/github-runner-role
      AWS_REGION: us-west-1
      PYTHON_VERSIONS: "3.11"
      CHECKOUT_REF: eric/cache-ci-builds
      VERSION_OVERRIDE: "0.0.0.dev0"
    secrets:
      GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}

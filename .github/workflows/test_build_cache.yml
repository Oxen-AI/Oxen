# Temporary: validates the sccache build cache. Currently exercising the
# publish verify-build cache (package + s3 restore/save, uploads omitted).
# Remove before merging.
name: 🧪 Test build cache

on:
  push:
    branches:
      - eric/cache-ci-builds

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  pkgverify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Free up disk space
        uses: ./.github/actions/free-disk-space
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::213020545630:role/github-runner-role
          role-duration-seconds: 3600
          aws-region: us-west-1
      - name: Restore verify dependency tree
        run: |
          KEY=$(printf '%s|%s|pkgverify-v1' "$(rustc -V)" "$(sha256sum Cargo.lock | cut -d' ' -f1)" | sha256sum | cut -c1-32)
          echo "PKGVERIFY_KEY=$KEY" >> "$GITHUB_ENV"
          if aws s3 cp "s3://oxen-ci-build-cache/pkgverify/$KEY.tar.zst" /tmp/pkgverify.tar.zst 2>/dev/null; then
            tar --zstd -xf /tmp/pkgverify.tar.zst -C /
            echo "pkgverify restore hit ($KEY)"
          else
            echo "pkgverify restore miss ($KEY)"
          fi
      - name: Package and verify crates
        env:
          CARGO_PROFILE_DEV_DEBUG: "0"
          CARGO_INCREMENTAL: "0"
        run: |
          cargo package --workspace --exclude oxen-py --target-dir "${{ github.workspace }}/target-verify"
      - name: Save verify dependency tree
        run: |
          if [ -f /tmp/pkgverify.tar.zst ]; then
            echo "pkgverify cache already present"
          else
            tar --zstd -cf /tmp/pkgverify-out.tar.zst -C / \
              "${GITHUB_WORKSPACE#/}/target-verify/debug/deps" \
              "${GITHUB_WORKSPACE#/}/target-verify/debug/build" \
              "${GITHUB_WORKSPACE#/}/target-verify/debug/.fingerprint" \
              "${HOME#/}/.cargo/registry/src" \
              "${HOME#/}/.cargo/registry/cache"
            aws s3 cp /tmp/pkgverify-out.tar.zst "s3://oxen-ci-build-cache/pkgverify/$PKGVERIFY_KEY.tar.zst"
            echo "pkgverify saved ($PKGVERIFY_KEY)"
          fi
